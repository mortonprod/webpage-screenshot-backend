service: webpage-screenshot-processor

plugins:
  - serverless-offline
  - serverless-domain-manager
  - serverless-reqvalidator-plugin
  - serverless-aws-documentation

custom:
  s3Bucket: ${self:service}-images-${opt:stage}
  width: 1200
  height: 800
  scroll_height: 200
  customDomain:
    domainName: apipagemelt-${opt:stage}.alexandermorton.co.uk
    stage: ${opt:stage}
    certificateName: 'alexandermorton.co.uk'
    createRoute53Record: true
    endpointType: 'edge'
    apiType: rest
    autoDomain: true
    securityPolicy: tls_1_2

provider:
  name: aws
  region: eu-west-2
  apiGateway:
    usagePlan:
      quota:
        limit: 10000
        offset: 0
        period: MONTH
      throttle:
        burstLimit: 10
        rateLimit: 10
  versionFunctions: false
  layers:
    # https://github.com/Sparticuz/chromium
    - arn:aws:lambda:${self:provider.region}:764866452798:layer:chromium:131
  runtime: nodejs20.x
  memorySize: 512
  timeout: 30
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource: arn:aws:s3:::${self:custom.s3Bucket}/*
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource: arn:aws:s3:::${self:custom.s3Bucket}/*

functions:
  screenshot:
    events:
      - http:
          path: /
          method: get
          cors:
            origin: 'https://pagemelt.alexandermorton.co.uk'
            headers:
              - Content-Type
              - Origin
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false
          reqValidatorName: 'screenshotValidator'
          request:
            parameters:
              querystrings:
                url: true
                vw: true
                vh: true
              headers:
                Origin: true
    handler: handler.screenshot
    reservedConcurrency: 10
    environment:
      S3_REGION: ${self:provider.region}
      S3_BUCKET: ${self:custom.s3Bucket}
      WIDTH: ${self:custom.width}
      HEIGHT: ${self:custom.height}
      SCROLL_HEIGHT: ${self:custom.scroll_height}

resources:
  Resources:
    # screenshotsBucket: temporarily removed for initial deploy — import via Phase 2
    # screenshotsBucket:
    #   Type: AWS::S3::Bucket
    #   DeletionPolicy: Retain
    #   Properties:
    #     BucketName: ${self:custom.s3Bucket}
    #     CorsConfiguration:
    #       CorsRules:
    #         - AllowedOrigins:
    #             - 'https://pagemelt.alexandermorton.co.uk'
    #           AllowedHeaders:
    #             - 'Authorization'
    #             - 'x-requested-with'
    #             - 'origin'
    #           AllowedMethods:
    #             - GET
    #           MaxAge: 3000
    #     PublicAccessBlockConfiguration:
    #       BlockPublicAcls: true
    #       BlockPublicPolicy: true
    #       IgnorePublicAcls: true
    #       RestrictPublicBuckets: true
    screenshotValidator:
      Type: "AWS::ApiGateway::RequestValidator"
      Properties:
        Name: 'screenshot-validator'
        RestApiId:
          Ref: ApiGatewayRestApi
        ValidateRequestBody: false
        ValidateRequestParameters: true
    screenshotResponseDefault400:
      Type: 'AWS::ApiGateway::GatewayResponse'
      Properties:
        RestApiId:
          Ref: 'ApiGatewayRestApi'
        ResponseType: DEFAULT_4XX
        StatusCode: "400"
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'https://pagemelt.alexandermorton.co.uk'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Origin,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        ResponseTemplates:
          application/json: "{\n\"message\": \" Missing information \",\n \"statusCode\": \"'400'\"\n}"
    screenshotResponseDefault500:
      Type: 'AWS::ApiGateway::GatewayResponse'
      Properties:
        RestApiId:
          Ref: 'ApiGatewayRestApi'
        ResponseType: DEFAULT_5XX
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'https://pagemelt.alexandermorton.co.uk'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Origin,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
