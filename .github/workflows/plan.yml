name: 'Webpage Screenshot Backend Push Check'
on:
  push:
    branches:
      - master
    tags-ignore:
      - v*
jobs:
  backend:
    name: 'Validate Backend'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Setup Node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install dependencies'
        run: npm install

      - name: 'Package Serverless (dry-run)'
        run: npx serverless package --stage prod
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
