name: 'Webpage Screenshot Backend Deploy'
on:
  push:
    tags:
      - v*
jobs:
  backend:
    name: 'Deploy Backend'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Setup Node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install dependencies'
        run: npm install

      - name: 'Import S3 bucket if exists outside stack'
        run: |
          STACK_NAME="webpage-screenshot-processor-prod"
          BUCKET_NAME="webpage-screenshot-processor-images-prod"
          REGION="eu-west-2"
          CHANGE_SET_NAME="import-screenshots-bucket-${{ github.run_id }}"

          # Skip import if bucket is already managed by the stack
          if aws cloudformation describe-stack-resource \
              --stack-name "$STACK_NAME" \
              --logical-resource-id screenshotsBucket \
              --region "$REGION" > /dev/null 2>&1; then
            echo "Bucket already in stack — skipping import"
            exit 0
          fi

          # Skip import if the bucket doesn't exist yet (CloudFormation will create it)
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Bucket does not exist yet — CloudFormation will create it"
            exit 0
          fi

          echo "Bucket exists outside stack — importing..."
          npx serverless package --stage prod

          aws cloudformation create-change-set \
            --stack-name "$STACK_NAME" \
            --change-set-name "$CHANGE_SET_NAME" \
            --change-set-type IMPORT \
            --resources-to-import '[{"ResourceType":"AWS::S3::Bucket","LogicalResourceId":"screenshotsBucket","ResourceIdentifier":{"BucketName":"webpage-screenshot-processor-images-prod"}}]' \
            --template-body file://.serverless/cloudformation-template-update-stack.json \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region "$REGION"

          aws cloudformation wait change-set-create-complete \
            --stack-name "$STACK_NAME" \
            --change-set-name "$CHANGE_SET_NAME" \
            --region "$REGION"

          aws cloudformation execute-change-set \
            --stack-name "$STACK_NAME" \
            --change-set-name "$CHANGE_SET_NAME" \
            --region "$REGION"

          # Poll until import finishes
          echo "Waiting for import to complete..."
          while true; do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query 'Stacks[0].StackStatus' \
              --output text \
              --region "$REGION")
            echo "Stack status: $STATUS"
            [[ "$STATUS" == "IMPORT_IN_PROGRESS" ]] || break
            sleep 5
          done

          if [[ "$STATUS" != "IMPORT_COMPLETE" ]]; then
            echo "Import failed with status: $STATUS"
            exit 1
          fi
          echo "Import complete"

      - name: 'Deploy via Serverless'
        run: npx serverless deploy --stage prod
